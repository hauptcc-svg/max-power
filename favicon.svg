<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>

  <!-- Body torso (red vest) -->
  <rect x="24" y="26" width="16" height="14" rx="3" fill="#c9391a"/>

  <!-- Head -->
  <circle cx="32" cy="20" r="6" fill="#3d2b1f"/>

  <!-- Left arm raised -->
  <line x1="24" y1="29" x2="13" y2="18" stroke="#3d2b1f" stroke-width="4" stroke-linecap="round"/>
  <!-- Left bicep bump -->
  <circle cx="17" cy="22" r="3.5" fill="#3d2b1f"/>
  <!-- Left fist -->
  <circle cx="12" cy="16" r="3" fill="#3d2b1f"/>

  <!-- Right arm raised -->
  <line x1="40" y1="29" x2="51" y2="18" stroke="#3d2b1f" stroke-width="4" stroke-linecap="round"/>
  <!-- Right bicep bump -->
  <circle cx="47" cy="22" r="3.5" fill="#3d2b1f"/>
  <!-- Right fist -->
  <circle cx="52" cy="16" r="3" fill="#3d2b1f"/>

  <!-- Wheelchair seat -->
  <rect x="22" y="40" width="20" height="4" rx="2" fill="#c9911a"/>

  <!-- Wheelchair back -->
  <rect x="38" y="30" width="3" height="14" rx="1.5" fill="#c9911a"/>

  <!-- Wheelchair left wheel -->
  <circle cx="24" cy="50" r="7" fill="none" stroke="#c9911a" stroke-width="2.5"/>
  <circle cx="24" cy="50" r="2" fill="#c9911a"/>

  <!-- Wheelchair right wheel -->
  <circle cx="44" cy="50" r="7" fill="none" stroke="#c9911a" stroke-width="2.5"/>
  <circle cx="44" cy="50" r="2" fill="#c9911a"/>

  <!-- Small front wheel -->
  <circle cx="32" cy="56" r="3" fill="none" stroke="#c9911a" stroke-width="2"/>

  <!-- Gold star accent -->
  <polygon points="32,5 33.5,9 37,9 34.5,11.5 35.5,15 32,12.5 28.5,15 29.5,11.5 27,9 30.5,9" fill="#c9911a"/>
</svg>
